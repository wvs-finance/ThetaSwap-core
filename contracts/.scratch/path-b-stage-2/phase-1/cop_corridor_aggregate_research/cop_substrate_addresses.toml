# ====================================================================
# §9 — Cross-substrate aggregator weights (PRE-PINNED, ANTI-FISHING-LOCKED)
# ====================================================================

[aggregator_weights]
methodology = "supply-share-weighted at audit_block, frozen for analysis window"
audit_block_celo = 65915058   # inherited from v0 audit; may be updated per CORRECTIONS-ζ
audit_block_polygon = "PENDING_PINNING_AT_REDISPATCH"
audit_block_solana = "PENDING_PINNING_AT_REDISPATCH"
weight_drift_threshold = 0.25  # if any substrate's supply-share drifts >25% during analysis window, CORRECTIONS-block fires
sparse_week_floor = 0.40       # substrates with <40% non-zero weeks emit `aggregate_weight = 0, sparse_flag = TRUE`
velocity_floor = 0.05          # substrates with <5% non-zero weeks excluded from aggregator entirely (DLYCOP-class)
double_counting_treatment = "NONE — Polygon and Celo deployments of Minteo COPM are SEPARATE supply pools (cross-chain bridge inflows not yet attested between them); treat as independent substrates"
weight_recomputation_policy = "PRE-PIN ONLY at audit_block. NO data-fitting weight tuning. Weight re-computation triggered ONLY by 25%-drift threshold OR substrate addition/deprecation per Section 10."

# ====================================================================
# §10 — Substrate addition/deprecation discipline
# ====================================================================

[substrate_lifecycle]
addition_rule = "New substrates may be added to the aggregator only after: (1) on-chain code verification, (2) issuer-attestation review, (3) 12-week minimum activity history at the proposed audit_block, (4) explicit CORRECTIONS-block in spec."
deprecation_rule = "Substrates with <5% non-zero weeks over the analysis window or with confirmed protocol shutdown are DEPRECATED at the next CORRECTIONS-block. Deprecation is one-way; re-promotion requires fresh 12-week history."
re_promotion_rule = "Previously deprecated substrates may be re-included only via explicit user adjudication + CORRECTIONS-block. No silent re-promotion."

