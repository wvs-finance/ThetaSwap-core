[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "cancun"
solc_version = "0.8.26"
via_ir = true
ffi = true
fs_permissions = [{ access = "read", path = "research/data/fixtures" }]

remappings = [
    "v4-core/=lib/uniswap-hooks/lib/v4-core/",
    "lib/2025-12-panoptic/:v4-core/=lib/2025-12-panoptic/lib/v4-core/src/",
    "chimera/=lib/chimera/src/",
    "reactive-lib/=lib/reactive-lib/src/",
    "@uniswap/v3-core/=lib/v3-core/",
    "angstrom/=lib/angstrom/contracts/",
]

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"

[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 64
depth = 32
fail_on_revert = false

[profile.fuzz-heavy]
ffi = true
[profile.fuzz-heavy.fuzz]
runs = 64
max_test_rejects = 131072
