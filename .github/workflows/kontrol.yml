name: Kontrol Proofs

permissions: {}

on:
  push:
    paths:
      - ".kontrol-proofs/**"
      - "src/fee-concentration-index/types/**"
      - ".github/workflows/kontrol.yml"
  pull_request:
    paths:
      - ".kontrol-proofs/**"
      - "src/fee-concentration-index/types/**"
      - ".github/workflows/kontrol.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  KONTROL_IMAGE: runtimeverificationinc/kontrol:ubuntu-jammy-1.0.231

jobs:
  kontrol-proofs:
    name: Kontrol formal verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Pull Kontrol image
        run: docker pull $KONTROL_IMAGE

      - name: Sync source files into kontrol-proofs
        run: cp -r src/fee-concentration-index/types/* .kontrol-proofs/src/fee-concentration-index/types/

      - name: Kontrol build
        run: |
          docker run --rm -v "${{ github.workspace }}/.kontrol-proofs":/workdir -w /workdir \
            $KONTROL_IMAGE kontrol build

      - name: Prove SwapCount invariants
        run: |
          docker run --rm -v "${{ github.workspace }}/.kontrol-proofs":/workdir -w /workdir \
            $KONTROL_IMAGE kontrol prove --match-test 'SwapCountProof.'

      - name: Prove FeeShareRatio invariants
        run: |
          docker run --rm -v "${{ github.workspace }}/.kontrol-proofs":/workdir -w /workdir \
            $KONTROL_IMAGE kontrol prove --match-test 'FeeShareRatioProof.'

      - name: Prove AccumulatedHHI invariants
        run: |
          docker run --rm -v "${{ github.workspace }}/.kontrol-proofs":/workdir -w /workdir \
            $KONTROL_IMAGE kontrol prove --match-test 'AccumulatedHHIProof.'
