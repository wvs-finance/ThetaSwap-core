name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  solidity:
    name: Solidity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv

  research:
    name: Research (Python tests + data provenance + notebooks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Create venv and install dependencies
        run: |
          uv venv uhi8 --python 3.13
          uv pip install --python uhi8/bin/python -e ".[dev]"

      - name: Install Jupyter kernel
        run: |
          uhi8/bin/python -m ipykernel install --user --name=thetaswap \
            --display-name "thetaswap" \
            --env PYTHONPATH "${{ github.workspace }}/research"

      - name: Verify data provenance (SHA-256 hashes)
        run: uhi8/bin/python research/data/scripts/verify_provenance.py

      - name: Run Python tests
        run: cd research && ../uhi8/bin/python -m pytest tests/ -v

      - name: Run notebooks
        run: |
          tmpdir=$(mktemp -d)
          for nb in research/notebooks/*.ipynb; do
            echo "Executing $nb ..."
            PYTHONPATH=research uhi8/bin/jupyter nbconvert \
              --to notebook --execute \
              --ExecutePreprocessor.timeout=300 \
              --ExecutePreprocessor.kernel_name=thetaswap \
              --output-dir="$tmpdir" \
              "$nb" || echo "WARN: $nb failed (non-blocking)"
          done
          rm -rf "$tmpdir"
